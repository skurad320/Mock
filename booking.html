<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book a Consultation | GreenScape</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #2e7d32;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
    }

    h2 {
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 15px;
      background: #2e7d32;
      color: white;
      border: none;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #388e3c;
    }

    .success {
      text-align: center;
      color: green;
      margin-top: 20px;
    }

    .back {
      display: block;
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<header>
  <h1>Book Your Consultation</h1>
</header>

<div class="container">
  <h2>Select Date & Time</h2>

  <form id="bookingForm">
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>

    <label>Select Date:</label>
    <input type="date" required>

    <label>Select Time:</label>
    <select required>
      <option value="">Choose a time</option>
      <option>09:00</option>
      <option>10:00</option>
      <option>11:00</option>
      <option>12:00</option>
      <option>13:00</option>
      <option>14:00</option>
      <option>15:00</option>
      <option>16:00</option>
    </select>

    <button type="submit">Confirm Booking</button>
  </form>

  <p class="success" id="successMessage"></p>

  <a href="index.html" class="back">← Back to Home</a>
</div>

<script>
  const form = document.getElementById("bookingForm");
  const message = document.getElementById("successMessage");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    message.innerText = "✅ Your booking request has been received! We will contact you shortly.";

    form.reset();
  });
</script>

</body>
</html>
