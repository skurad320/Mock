<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Booking Confirmed | GreenScape</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Same bubbly font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #e8f5e9, #f9f9f9);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      animation: popIn 0.8s ease;
    }

    @keyframes popIn {
      from {transform: scale(0.8); opacity: 0;}
      to {transform: scale(1); opacity: 1;}
    }

    .icon {
      font-size: 60px;
      margin-bottom: 10px;
    }

    h1 {
      color: #2e7d32;
      margin-bottom: 10px;
    }

    p {
      margin: 10px 0;
      color: #555;
    }

    .details {
      background: #f1f8f4;
      padding: 15px;
      border-radius: 15px;
      margin: 20px 0;
    }

    .details strong {
      color: #2e7d32;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      border-radius: 30px;
      background: #2e7d32;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #43a047;
      transform: scale(1.05);
    }

    .footer-note {
      margin-top: 15px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="icon">🌿</div>

  <h1>You're All Set!</h1>

  <p id="personalMessage">Thank you for booking with us.</p>

  <div class="details">
    <p><strong>Name:</strong> <span id="name"></span></p>
    <p><strong>Date:</strong> <span id="date"></span></p>
    <p><strong>Time:</strong> <span id="time"></span></p>
  </div>

  <p>We truly appreciate you choosing GreenScape.</p>
  <p>Our team will contact you shortly to confirm everything 🌱</p>

  <a href="index.html" class="btn">Back to Home</a>

  <p class="footer-note">Need to make changes? Just reply to our email or give us a call.</p>

</div>

<script>
  const name = localStorage.getItem("name");
  const date = localStorage.getItem("date");
  const time = localStorage.getItem("time");

  if (name) {
    document.getElementById("name").innerText = name;
    document.getElementById("personalMessage").innerText =
      "Thanks " + name + ", your booking has been received!";
  }

  if (date) document.getElementById("date").innerText = date;
  if (time) document.getElementById("time").innerText = time;
</script>

</body>
</html>
